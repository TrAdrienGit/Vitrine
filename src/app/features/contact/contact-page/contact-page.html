<div class="min-h-screen bg-(--bg-primary) text-(--text-primary)">

  <section class="max-w-3xl mx-auto px-6 py-20 space-y-10">

    <!-- TITRE -->
    <header class="text-center space-y-3">
      <h1 class="text-4xl font-bold">Contact</h1>

      <p class="text-(--text-secondary)">
        Pour toute question ou demande, vous pouvez me contacter directement.
      </p>
    </header>

    <!-- INFO CONTACT -->
    <div class="bg-(--bg-secondary) p-6 rounded-xl space-y-4">

      <h2 class="text-xl font-semibold">Informations</h2>

      <p>Email : admin&#64;example.com</p>
      <p>Téléphone : +33 6 00 00 00 00</p>

      <div class="flex gap-4 text-blue-400">
        <a href="#">GitHub</a>
        <a href="#">LinkedIn</a>
      </div>

    </div>

    <!-- MESSAGE SIMPLE -->
    <div class="space-y-4">

      <h2 class="text-xl font-semibold">Envoyer un message</h2>

      <input
        type="text"
        placeholder="Nom"
        class="w-full p-3 rounded bg-slate-800"
      />

      <input
        type="email"
        placeholder="Email"
        class="w-full p-3 rounded bg-slate-800"
      />

      <textarea
        placeholder="Message"
        class="w-full p-3 rounded bg-slate-800 h-32"
      ></textarea>

      <button class="px-6 py-3 bg-blue-600 rounded-lg">
        Envoyer
      </button>

    </div>

  </section>

</div>
