<div class="min-h-screen bg-(--bg-primary) text-(--text-primary)">

  @if (project$ | async; as project) {
    <app-project-header [project]="project"></app-project-header>

    <!-- LAYOUT GLOBAL -->
    <main class="max-w-5xl mx-auto p-6 grid grid-cols-1 md:grid-cols-4 gap-8">

      <!-- SOMMAIRE -->
      <aside class="md:col-span-1 sticky top-6 h-fit">

        <app-project-toc [project]="project" class="space-y-2"></app-project-toc>

      </aside>

      <!-- CONTENU -->
      <section class="md:col-span-3">
        <app-project-content [project]="project" class="space-y-5"></app-project-content>
      </section>

    </main>

    <app-project-footer [project]="project"></app-project-footer>
  }
  @else {
    <!-- LOADING -->
    <div class="animate-pulse p-6 space-y-6">

      <div class="h-48 bg-(--bg-secondary) rounded-xl"></div>
      <div class="h-6 w-1/2 bg-(--bg-secondary) rounded"></div>

    </div>

    <!-- MESSAGE CENTRÉ
    <div class="flex justify-center items-center py-20">
      <p class="text-red-400 text-center">
        Aucun projet correspondant ou erreur de chargement
      </p>
    </div>-->
  }


</div>
