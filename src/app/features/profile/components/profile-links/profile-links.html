<!-- LIENS SUPPLEMENTAIRES -->
<section class="bg-(--bg-secondary) p-6 rounded-xl space-y-2">

  <h2 class="text-2xl font-semibold">Liens supplémentaires</h2>

  <ul class="list-disc list-inside text-gray-300 space-y-1">
    @for (link of member.supplementary_link; track $index)
    {
      <li><a class="text-(--text-link) hover:underline" href="{{link.link}}">{{link.text}}</a></li>
    }
  </ul>

</section>
