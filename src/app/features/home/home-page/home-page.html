<div class="min-h-screen bg-(--bg-primary) text-(--text-primary)">

  <section class="max-w-6xl mx-auto px-6 py-16">

    <h1 class="text-5xl font-bold text-center">
      Project Hub
    </h1>

    <p class="text-center mt-4 text-(--text-secondary)">
      Découvrez nos projets, nos parcours et nos réalisations.
    </p>

    <div class="mt-16">

      @if (members$ | async; as members) {

        @if (members.length > 0) {

          <div
            class="grid gap-8"
            [class.grid-cols-1]="members.length === 1"
            [class.grid-cols-2]="members.length === 2"
            [class.grid-cols-3]="members.length >= 3"
            [class.place-items-center]="members.length === 1"
          >
            @for (member of members; track member.id) {
              <app-member-card [member]="member" class="w-full max-w-sm mx-auto aspect-1/4"></app-member-card>
            }
          </div>

        } @else {

          <!-- MESSAGE CENTRÉ -->
          <div class="flex justify-center items-center py-20">
            <p class="text-red-400 text-center">
              Aucun membre disponible ou erreur de chargement
            </p>
          </div>

        }


      }
      @else {
        <!-- LOADING STATE -->
        <div class="grid gap-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">

          @for (i of [1,2,3]; track i) {
            <div class="w-full max-w-sm mx-auto animate-pulse">
              <div class="h-64 bg-(--bg-secondary) rounded-xl"></div>
              <div class="h-4 mt-4 bg-(--bg-secondary) rounded w-3/4"></div>
              <div class="h-4 mt-2 bg-(--bg-secondary) rounded w-1/2"></div>
            </div>
          }

        </div>
      }

    </div>

  </section>

</div>
